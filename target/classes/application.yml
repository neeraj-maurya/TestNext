spring:
  application:
    name: testnext
    description: TestNext - Multi-tenant test automation platform
  datasource:
    url: jdbc:postgresql://localhost:5432/testnext
    username: testnext
    password: password
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false # we'll run tenant migrations programmatically per schema
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true  # Let Hibernate create tables before data.sql runs
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always  # Run data-postgres.sql on non-embedded databases
      platform: postgres

# Observability and monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# Security and other configs to be added
